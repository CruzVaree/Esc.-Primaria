<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="../CSS/registroAlumnos.css">
    <link rel="icon" href="../Imagenes/pavicon.png" type="image/png">
    <title>Registro Alumnos</title>
</head>

<body>
    <div id="contenedor">
        <form method="POST" action="../PHP/registroAlumnos.php">
            <label for="matricula">Matricula:</label>
            <input type="text" name="matricula" placeholder="Matricula" required>

            <label for="Nombre">Nombre completo:</label>
            <input type="text" name="nombre" placeholder="Nombre" required>

            <label for="telefono">Telefono:</label>
            <input type="tel" name="telefono" placeholder="telefono" required>

            <label for="promedio">Promedio:</label>
            <input type="number" name="promedio" placeholder="promedio" step="0.01" required value="0">

            <button type="submit">Enviar</button>
        </form>

    </div>

</body>

</html>
